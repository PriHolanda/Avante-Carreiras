<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avante Carreiras - Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <nav class="nav-container">

            <!-- Logo fallback (sem arquivo de imagem) -->
            <a href="membros.html" class="logo-fallback">
                <div class="logo-icon">A</div>
                <div class="logo-text">
                    <span class="logo-name">AVANTE</span>
                    <span class="logo-sub">TECH JR · CARREIRAS</span>
                </div>
            </a>

            <div class="nav-list">
                <a class="item-list" href="membros.html">
                    <i class="fa-solid fa-user-group"></i> Membros
                </a>
                <a class="item-list active" href="documentos.html">
                    <i class="fa-regular fa-folder"></i> Documentos
                </a>
                <a class="item-list" href="#">
                    <i class="fa-solid fa-circle-plus"></i> Mais
                </a>
            </div>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div class="main-container">

            <div class="profile-card">

                <!-- Header: avatar + dados -->
                <div class="profile-header">
                    <div class="avatar-wrapper">
                        <i class="fa-regular fa-user"></i>
                    </div>

                    <div class="profile-info">
                        <p class="profile-name">Daniel Jacó dos Santos Pereira</p>
                        <p class="profile-detail">Setor: <span>Projetos</span></p>
                        <p class="profile-detail">Data de nascimento: <span>30/05/2002</span></p>
                        <p class="profile-detail">Data de admissão: <span>16/04/2024</span></p>
                        <p class="profile-detail">Email: <span>danieljaco@gmail.com</span></p>
                    </div>
                </div>

                <!-- Tabela de documentos -->
                <div class="docs-table">
                    <div class="docs-table-header">
                        <span>Nome</span>
                        <span>Data de envio</span>
                        <span>Status</span>
                    </div>

                    <!-- Linha 1 -->
                    <div class="doc-row">
                        <div class="doc-name">
                            <div class="doc-icon">V</div>
                            Voluntariado assinado.pdf
                        </div>
                        <span class="doc-date">29/05/2023</span>
                        <div class="doc-status">
                            Regular
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- Linha 2 -->
                    <div class="doc-row">
                        <div class="doc-name">
                            <div class="doc-icon download">
                                <i class="fa-solid fa-arrow-up-from-bracket"></i>
                            </div>
                            Documento de Recisão
                        </div>
                        <span class="doc-date"></span>
                        <div class="doc-status">
                            Pendente
                            <label class="toggle-switch">
                                <input type="checkbox">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </main>

</body>
</html>
