<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avante Carreiras - Documentos</title>
    <link rel="stylesheet" href="../css/membros.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="../assets/logo.png">
</head>

<body class="documentos-page">
    <aside class="sidebar">
        <nav class="nav-container">
            <img src="../assets/avante-logo.webp" alt="Logo Avante" class="img-logo">

            <div class="nav-list">
                <a class="item-list" href="membros.html">
                    <i class="fa-solid fa-user-group"></i> Membros
                </a>

                <a class="item-list active" href="documentos.html">
                    <i class="fa-regular fa-folder"></i> Documentos
                </a>
            </div>
        </nav>
    </aside>

    <main class="main">
        <div class="main-container">
            <div class="search-box">
                <i class="fa-solid fa-bars"></i>
                <input type="search" placeholder="Buscar por nome ou setor..." class="search-input" id="buscaDocumentos">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <section class="main-table">
                <div class="tabs-container">
                    <ul class="tabs-menu">
                        <li class="tab-item active" data-tipo="todos">Todos</li>
                        <li class="tab-item" data-tipo="voluntariado">Voluntariado</li>
                        <li class="tab-item" data-tipo="rescisao">Rescisao</li>
                    </ul>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <span class="table-header-item">Colaborador</span>
                        <span class="table-header-item">Data de envio</span>
                        <span class="table-header-item">Tipo de documento</span>
                    </div>

                    <div class="table-body" id="tabelaDocumentos"></div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/documentos.js"></script>
    <script>
        NAV.init('admin');
    </script>
</body>

</html>
