<!DOCYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Avante Carreiras</title>
        <link rel="stylesheet" href="CSS/login.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
      <link rel="icon" href="./img/logo.png">
    </head>

    <body>
        <main class="login">

            <!-- lado esquerdo -->
            <section class="login-left">
                <img src="./img/avante-logo.webp" alt="Logo Avante Carreiras" class="logo-avante">
                <h2 class="txt-login">Soluções <br> Tecnológicas</h2>
                <h2 class="txt-login2">Avançar <br> É a Nossa Missão </h2>
            </section>

            <!-- lado direito -->

            <section class="login-right">
                <h1 class="welcome-login">Seja Bem-vindo!</h1>

                <form>
                    <div class="inputs-box">
                        <input class="input" type="email" placeholder="Insira email">
                        <input class="input" type="password" placeholder="Insira senha">
                    </div>

                    <a href="#" class="forgot">Esqueceu a senha?</a>

                    <div class="buttons-form">
                        <button class="btn-login">Login</button>
                        <button class="btn-cadastro">Cadastro</button>
                    </div>
                </form>
            </section>
        </main>

    </body>

    </html>
